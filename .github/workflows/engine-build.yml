name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Source Files
        run: node index.js

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Auto-Fixer Logic
        run: |
          npm install -g @bubblewrap/cli
          
          # ၁။ မေးခွန်းအားလုံးကို အတင်းကျော်ခိုင်းခြင်း (Force Yes)
          # ၂။ Android SDK နဲ့ JDK လမ်းကြောင်းများကို အသေပြသခြင်း
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          echo "🚀 Initializing Bubblewrap..."
          yes | bubblewrap init --manifest=manifest.json || true
          
          echo "🚀 Creating Security Keys..."
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi
          
          echo "🚀 Running Build Process..."
          # build အဆင့်မှာ error တက်ခဲ့ရင်တောင် နောက်ဆုံးထိ ဆက်သွားခိုင်းခြင်း
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Success-APK
          path: ./*.apk
