name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Source Files
        run: node index.js

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # မေးခွန်းအားလုံးကို အလိုအလျောက် ဖြေကြားရန် (Non-interactive mode)
          # Key Store ကို အလိုအလျောက် ဆောက်ခိုင်းထားသည်
          bubblewrap init --manifest=manifest.json --yes || true
          
          # Build မလုပ်ခင် key မရှိလျှင် အလိုအလျောက် ဆောက်ရန်
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi
          
          # Build with key information
          bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Final-APK
          path: ./*.apk
