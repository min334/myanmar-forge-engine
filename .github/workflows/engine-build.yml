name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # AI မခေါ်ဘဲ Main UI ကို တိုက်ရိုက်ထုတ်ပေးရန် index.js ကို run မည်
      - name: Generate Source
        run: node index.js

      # အမှားအယွင်းမရှိ APK ထုတ်လုပ်ပေးမည့် အတည်ပြုပြီး tool
      - name: Build Android APK
        uses: cpina/pwa-builder-github-action@v1
        with:
          # Raw HTML ကို တိုက်ရိုက်ယူပြီး APK ဆောက်ခြင်း
          source_dir: '.'
          html_source: 'index.html'
          app_name: "Myanmar Forge"
          package_name: "com.minthitsar.forge"
          icon: "https://raw.githubusercontent.com/${{ github.repository }}/main/icon.png"

      # zip အဖြစ်မဟုတ်ဘဲ .apk ဖိုင်ကို တိုက်ရိုက်တင်ရန် artifact ကို ပြင်ဆင်ခြင်း
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Controller-APK
          path: ./*-pwa-builder.apk
