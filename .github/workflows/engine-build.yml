name: Myanmar Forge Engine (Capacitor Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install & Build Web
        run: |
          npm install
          node index.js # Web files (dist/www) ထုတ်လုပ်ခြင်း

      - name: ⚡ Capacitor Sync
        run: |
          npx cap init "Myanmar Forge" "com.minthitsar.goldcalc" --web-dir www || true
          npx cap add android || true
          npx cap sync android

      - name: 🤖 AI Auto-Fix (If Sync Fails)
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node fixer.js # Error ရှိလျှင် AI က capacitor.config.json ကို ပြင်ပေးမည်
          npx cap sync android

      - name: 🚀 Build Android APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Capacitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
