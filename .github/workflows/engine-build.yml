name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Source
        run: node index.js

      - name: Create Android Project Structure
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          # APK အစစ်ဖြစ်ကြောင်း ဖုန်းက သိအောင် manifest ထည့်ပေးခြင်း
          echo '{"name": "Myanmar Forge", "short_name": "Forge", "start_url": ".", "display": "standalone"}' > android/app/src/main/assets/manifest.json

      # အပြင်က Tool တွေကို အားမကိုးဘဲ ကိုယ်တိုင် Zip ထုပ်ပြီး APK နာမည်ပေးခြင်း
      # မှတ်ချက် - ဤနည်းသည် Debug APK အဖြစ် အလုပ်လုပ်ရန် ဖုန်းထဲတွင် .apk ဟု rename ပေးရန်လိုနိုင်သည်
      - name: Package APK
        run: |
          zip -r Myanmar-Forge-Controller.apk android/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Controller-APK
          path: Myanmar-Forge-Controller.apk
