name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Keys & Files
        run: |
          node index.js
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"

      - name: Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          npm install -g @bubblewrap/cli
          # yes | ကို သုံးပြီး မေးခွန်းအားလုံးကို အလိုအလျောက် ဖြေခိုင်းခြင်း
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Auto-Fix
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Package name ကို quote (မျက်တောင်ဖွင့်ပိတ်) ထဲ ထည့်သွင်းခြင်း
          npm install "@google/generative-ai"
          node fixer.js
          echo "🚀 AI Fixed. Retrying..."
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Final-APK
          path: ./*.apk
