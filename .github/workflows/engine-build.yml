name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Factory Initializing
        run: |
          npm install
          npm install -g @bubblewrap/cli
          node index.js
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi

      - name: 🚀 Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          # twa-manifest.json မရှိရင် အရင်ဆောက်ခိုင်းခြင်း
          bubblewrap init --manifest=manifest.json --directory=./ || true
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Multi-Model Auto-Fix (Gemini 2.0 Focused)
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node fixer.js
          echo "🚀 AI မှ ပြင်ဆင်ပြီးပါပြီ။ APK ပြန်လည်ထုတ်လုပ်နေသည်..."
          # AI ပြင်ပေးလိုက်သော ဖိုင်ရှိမရှိ စစ်ဆေးပြီးမှ Build ပြန်လုပ်ခြင်း
          if [ -f "twa-manifest.json" ]; then
            yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true
          else
            echo "AI could not create the manifest file."
            exit 1
          fi

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Final-APK
          path: ./*.apk
