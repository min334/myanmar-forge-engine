name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  <-- ဒီနေရာကို ဖယ်လိုက်ပါပြီ

      - name: Install Dependencies
        run: |
          npm install --no-package-lock # lock file မရှိလည်း အလုပ်လုပ်အောင် လုပ်ခြင်း
          npm install -g @bubblewrap/cli

      - name: Create Source Files & Keys
        run: |
          node index.js
          # Signing Key မရှိရင် ဆောက်မယ်၊ ရှိရင် ကျော်မယ်
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi

      - name: Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          # yes | ကို သုံးပြီး မေးခွန်းအားလုံးကို အလိုအလျောက် ကျော်ခြင်း
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Auto-Fix (If Build Fails)
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node fixer.js
          echo "🚀 AI ပြင်ဆင်ပြီးပါပြီ။ ဒုတိယအကြိမ် Build စတင်နေသည်..."
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Final-APK
          path: ./*.apk
