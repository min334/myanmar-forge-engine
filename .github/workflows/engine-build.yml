name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Factory Initializing
        run: |
          npm install
          npm install -g @bubblewrap/cli
          node index.js
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi

      - name: 🚀 Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          bubblewrap init --manifest=manifest.json --metaData=twa-manifest.json --directory=./ || true
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Multi-Model Auto-Fix
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node fixer.js
          echo "🚀 AI မှ ပြင်ဆင်မှုများ ပြုလုပ်ပြီးပါပြီ။ ဒုတိယအကြိမ် ပြန်လည် Build လုပ်နေသည်..."
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Final-APK
          path: ./*.apk
