name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Source Files
        run: node index.js

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Bubblewrap ကို သုံးပြီး Install လုပ်လို့ရမည့် APK စစ်စစ် ထုတ်ခြင်း
      - name: Build APK with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # Android Project တစ်ခုအဖြစ် ပုံသွင်းခြင်း
          yes | bubblewrap init --manifest=manifest.json --extracp=index.html || true
          yes | bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Installable-APK
          path: ./*.apk
