name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Source Files
        run: node index.js

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # ချိန်ညှိချက်များအားလုံးကို အလိုအလျောက် လက်ခံရန် yes ကို သုံးထားသည်
          yes | bubblewrap init --manifest=manifest.json || true
          yes | bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-APK
          path: ./*.apk
