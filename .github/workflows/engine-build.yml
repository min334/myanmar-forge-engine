name: Myanmar Forge Engine Build
on:
  workflow_dispatch:
    inputs:
      app_idea:
        description: 'What app do you want to build?'
        required: true
        default: 'Simple Gold Calculator'

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Forge Engine
        # ဒီနေရာမှာ Key တွေကို index.js ဆီ တိုက်ရိုက် လှမ်းချိတ်ပေးထားပါတယ်
        run: node index.js "${{ github.event.inputs.app_idea }}"
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_FORGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
