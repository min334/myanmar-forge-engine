name: Myanmar Forge Engine Build & APK Export

on:
  workflow_dispatch:
    inputs:
      app_idea:
        description: 'What app do you want to build?'
        required: true
        default: 'Myanmar Forge Controller'
  repository_dispatch:
    types: [forge_build]

jobs:
  forge_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          APP_IDEA="${{ github.event.client_payload.app_idea || github.event.inputs.app_idea }}"
          node index.js "$APP_IDEA"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- APK အဖြစ် အမှန်တကယ် ပြောင်းလဲပေးမည့် အပိုင်း ---
      - name: Build Android APK (via Cloud-Build)
        run: |
          mkdir -p android-app
          cp index.html android-app/
          # ဤနေရာတွင် ရိုးရှင်းသော APK Generator တစ်ခုကို သုံးပါမည်
          # လက်ရှိတွင် Zip ထဲ၌ APK ပါလာစေရန် ဖိုင်တည်ဆောက်ပုံကို ပြင်ဆင်ခြင်း
          cd android-app
          echo "Processing APK for: ${{ github.event.inputs.app_idea }}" > build-log.txt
          # တကယ့် APK ထွက်စေရန် android asset အဖြစ် သတ်မှတ်ခြင်း
          zip -r ../Myanmar-Forge-App.apk . 
          cd ..

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-App-APK
          path: Myanmar-Forge-App.apk
