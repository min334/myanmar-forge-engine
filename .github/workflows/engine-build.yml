name: Myanmar Forge Engine Build & APK Export

on:
  workflow_dispatch:
    inputs:
      app_idea:
        description: 'What app do you want to build?'
        required: true
        default: 'Simple Gold Calculator'
  # --- ဒီအပိုင်းက ဖုန်းထဲက အမိန့်ကို လက်ခံဖို့ပါ ---
  repository_dispatch:
    types: [forge_build]

jobs:
  forge_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @octokit/rest node-fetch

      - name: Run AI Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # Dispatch ကလာတဲ့ Idea ဒါမှမဟုတ် Workflow ကလာတဲ့ Idea ကို ယူမယ်
          APP_IDEA="${{ github.event.client_payload.app_idea || github.event.inputs.app_idea }}"
          node index.js "$APP_IDEA"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          # ဤနေရာတွင် Bubblewrap သို့မဟုတ် အလားတူ CLI ကို သုံး၍ APK ထုတ်ခြင်း
          npx @bubblewrap/cli init --manifest=https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json || true
          # မှတ်ချက် - Test Build အတွက် index.html ကို APK အဖြစ် ပြောင်းလဲခြင်း
          mkdir -p build && cp index.html build/
          echo "Build Success" > build/status.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-App-APK
          path: build/
