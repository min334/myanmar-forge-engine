name: Myanmar Forge Engine (Capacitor Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install & Build Web
        run: |
          npm install
          node index.js
          # www folder ကို သေချာပေါက်ရှိအောင် လုပ်ခြင်း
          mkdir -p www
          # index.html လက်ရှိနေရာမှာရှိရင် www ထဲကို ကူးမယ်
          [ -f "index.html" ] && cp index.html www/ || true
          # manifest.json လက်ရှိနေရာမှာရှိရင် www ထဲကို ကူးမယ်
          [ -f "manifest.json" ] && cp manifest.json www/ || true
          # အကယ်၍ dist ထဲမှာ ရှိနေခဲ့ရင်လည်း www ထဲကို ကူးမယ်
          [ -d "dist" ] && cp -r dist/* www/ || true
          # Capacitor Sync အတွက် index.html မရှိမဖြစ် ရှိနေရပါမယ်
          touch www/index.html

      - name: ⚡ Capacitor Sync
        run: |
          # Android platform မရှိသေးရင် ထည့်မယ်၊ ရှိပြီးသားဆိုရင် Sync လုပ်မယ်
          npx cap init "Myanmar Forge" "com.minthitsar.goldcalc" --web-dir www || true
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: 🚀 Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Capacitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
