name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          node index.js
          npm install -g @bubblewrap/cli
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Auto-Fix (Error တက်လျှင် ပြင်ဆင်ခြင်း)
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install @google-generative-ai
          node fixer.js
          echo "🚀 AI ပြင်ဆင်ပြီးပါပြီ။ APK ပြန်ထုတ်နေသည်..."
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-AI-Fixed-APK
          path: ./*.apk
