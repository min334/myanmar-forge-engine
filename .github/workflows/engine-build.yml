name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # index.html ရှိနေတာ သေချာအောင်အရင်လုပ်မယ်
          node index.js
          # Buildozer နဲ့ APK ထုတ်မယ် (၅ မိနစ်ခန့် ကြာနိုင်သည်)
          ~/.local/bin/buildozer -v android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Installable-APK
          path: bin/*.apk
