name: Myanmar Forge Engine Build & APK Export
on:
  workflow_dispatch:
    inputs:
      app_idea:
        description: 'What app do you want to build?'
        required: true
        default: 'Simple Gold Calculator'

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Dependencies
        run: npm install

      - name: Run AI Engine
        id: ai_step
        run: node index.js "${{ github.event.inputs.app_idea }}"
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Prepare Android Build
        # index.html ရှိမှသာ ဆက်လုပ်မယ့် logic
        run: |
          if [ -f index.html ]; then
            mkdir -p dist
            cp index.html dist/
            echo "✅ index.html found. Proceeding to build..."
          else
            echo "🚨 index.html was not generated. Build aborted."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          npx cap add android || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
