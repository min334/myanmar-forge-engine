name: Myanmar Forge Engine (Capacitor Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install & Build Web
        run: |
          npm install
          node index.js
          # www folder မရှိရင် အတင်းဆောက်ခိုင်းပြီး index.html ကို ကူးထည့်ခြင်း
          mkdir -p www
          if [ -d "dist" ]; then cp -r dist/* www/; fi
          if [ -f "index.html" ]; then cp index.html www/; fi

      - name: ⚡ Capacitor Sync
        run: |
          npx cap init "Myanmar Forge" "com.minthitsar.goldcalc" --web-dir www || true
          npx cap add android || true
          # Sync မလုပ်ခင် www/index.html ရှိမရှိ ထပ်စစ်ခြင်း
          touch www/index.html
          npx cap sync android

      - name: 🚀 Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Capacitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
