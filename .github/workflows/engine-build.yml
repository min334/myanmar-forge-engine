name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Source
        run: node index.js

      # အမှားအယွင်းကင်းစွာ APK ထုတ်ပေးမည့် စနစ်
      - name: Build Android APK
        uses: flandis/pwa-to-apk-action@v1.1.0
        with:
          app_name: "Myanmar Forge"
          package_name: "com.minthitsar.forge"
          # ဖိုင်ကို RAW အနေနဲ့ယူပြီး APK ဆောက်မှာဖြစ်လို့ အလုပ်လုပ်မှာ သေချာပါတယ်
          start_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/index.html"
          icon: "https://raw.githubusercontent.com/${{ github.repository }}/main/icon.png"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-Controller-APK
          path: ./*.apk
