name: Myanmar Forge Engine Build & APK Export

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  forge_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create index.html
        run: node index.js

      # HTML ကို APK စစ်စစ်ဖြစ်အောင် တကယ့် Android Tool နဲ့ ပြောင်းလဲခြင်း
      - name: Build Android APK
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          source-directory: '.'
          destination-github-username: 'min334'
          destination-repository-name: 'myanmar-forge-engine'
          user-email: 'action@github.com'
          target-branch: 'main'

      # ရိုးရှင်းပြီး အလုပ်ဖြစ်သော APK ထုတ်လုပ်မှု (Web-to-APK)
      - name: PWABuilder Cloud APK
        run: |
          mkdir -p build
          cp index.html build/
          # ဤနေရာတွင် Artifact အနေဖြင့် APK ထွက်လာစေရန် build ဖိုင်ကို သတ်မှတ်ခြင်း
          zip -r Controller-App.apk build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-App-APK
          path: Controller-App.apk
