name: Myanmar Forge Engine Build & APK Export

on:
  workflow_dispatch:
  repository_dispatch:
    types: [forge_build]

jobs:
  forge_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create index.html
        run: node index.js

      - name: Package HTML to APK
        run: |
          mkdir -p build
          cp index.html build/
          # ဤနေရာတွင် ရိုးရှင်းသော ZIP structure ဖြင့် APK ထွက်လာစေရန် လုပ်ဆောင်ခြင်း
          zip -r Myanmar-Forge-Controller.apk build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-App-APK
          path: Myanmar-Forge-Controller.apk
