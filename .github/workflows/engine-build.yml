name: Myanmar Forge Engine APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Factory Initializing
        run: |
          npm install
          npm install -g @bubblewrap/cli
          # Source ဖိုင်များ ထုတ်လုပ်ခြင်း
          node index.js 
          # Signing Key မရှိလျှင် အလိုအလျောက် ဆောက်ခြင်း
          if [ ! -f "android.keystore" ]; then
            keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Min Thitsa Aung, OU=Forge, O=Myanmar, L=Yangon, S=Yangon, C=MM"
          fi

      - name: 🚀 Build Attempt 1
        id: try1
        continue-on-error: true
        run: |
          # Bubblewrap ၏ မေးခွန်းများကို 'yes |' ဖြင့် အလိုအလျောက် ဖြေကြားခြင်း
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password > error.log 2>&1

      - name: 🤖 AI Auto-Fix (Using your Smart Discovery logic)
        if: steps.try1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # ai-engine.js ကို အသုံးပြု၍ Error ပြင်ဆင်ခြင်း
          node ai-engine.js 
          echo "🚀 AI ပြင်ဆင်မှု ပြီးဆုံးပါပြီ။ APK ပြန်လည် ထုတ်လုပ်နေသည်..."
          # Fix ပြီးနောက် ဒုတိယအကြိမ် Build လုပ်ခြင်း
          yes | bubblewrap build --signingKeyPath=android.keystore --signingKeyAlias=android --signingKeyPassword=password --signingStorePassword=password || true

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Myanmar-Forge-APK
          path: ./*.apk
