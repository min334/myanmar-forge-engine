name: 02-Forge-New-App
on:
  repository_dispatch:
    types: [forge_build] # ဖုန်းထဲက ခလုတ်နှိပ်လိုက်ရင် ဒီကောင် နိုးလာမယ်

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🤖 AI Coding
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_IDEA: ${{ github.event.client_payload.app_idea }}
        run: |
          # AI ဆီက Code တောင်းပြီး index.html အသစ်ရေးမယ်
          node ai-generator.js 
      - name: Build New APK
        run: |
          npm install
          npx cap init "New App" "com.minthitsar.generated" --web-dir www || true
          [ ! -d "android" ] && npx cap add android
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Result-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
