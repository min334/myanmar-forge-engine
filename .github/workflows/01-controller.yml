name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          # package.json ရှိနေဖို့ သေချာအောင် အရင်လုပ်မယ်
          npm init -y
          # လိုအပ်တဲ့ tool တွေကို တစ်ခါတည်း install လုပ်မယ်
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # UI logic ကို build လုပ်မယ်
          node index.js

      - name: Force Regenerate Android with Assets
        run: |
          # ၁။ အိုင်ကွန်တွေနဲ့ Splash ကို assets folder ထဲကနေ Generate လုပ်မယ်
          # --asset-path assets ဆိုပြီး လမ်းကြောင်းကို အတိအကျ ညွှန်ပြထားပါတယ်
          npx @capacitor/assets generate --android --asset-path assets

          # ၂။ ရှိပြီးသား android project folder အဟောင်းကို ဖျက်မယ်
          rm -rf android
          
          # ၃။ Android Project အသစ်ပြန်တည်ဆောက်မယ်
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          
          # ၄။ ပုံတွေနဲ့ UI ကုဒ်တွေကို android project ထဲကို Sync လုပ်မယ်
          npx cap copy android
          npx cap sync android

          # ၅။ (အရေးကြီး) အိုင်ကွန်တွေ မပြောင်းမှာစိုးလို့ resources ထဲကနေ android res ထဲကို အတင်းကူးထည့်မယ်
          cp -R resources/android/* android/app/src/main/res/ || true

      - name: Build Android APK
        run: |
          cd android
          # gradlew ကို execute လုပ်ပိုင်ခွင့်ပေးမယ်
          chmod +x gradlew
          # APK ထုတ်မယ်
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
