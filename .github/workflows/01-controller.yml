name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          node index.js

      - name: Force Regenerate Android with Direct Assets
        run: |
          # ၁။ အိုင်ကွန်ထုတ်တဲ့ tool ကို error မတက်အောင် ရိုးရိုးပဲ run ခိုင်းမယ်
          npx @capacitor/assets generate --android || true

          # ၂။ Android folder အဟောင်းကို ဖျက်ပြီး အသစ်ဆောက်မယ်
          rm -rf android
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          npx cap copy android
          
          # ၃။ (အရေးကြီးဆုံးအချက်) အပြင်မှာရှိတဲ့ ပုံတွေကို အိုင်ကွန်နေရာတွေထဲ အတင်းလိုက်ထည့်မယ်
          # နာမည်တိုက်ရိုက်ခေါ်သုံးပြီး manual copy လုပ်တာပါ
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icon-only.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          cp icon-only.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true
          
          # ၄။ Splash Screen အတွက်လည်း အတင်းထည့်မယ်
          mkdir -p android/app/src/main/res/drawable
          cp splash.png android/app/src/main/res/drawable/splash.png || true

          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
