name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          node index.js

      - name: Force Regenerate Android with Assets
        run: |
          # ၁။ Error တက်စေတဲ့ option ကို မသုံးဘဲ ပုံတွေကို Root ထဲ ခဏထုတ်မယ်
          cp assets/*.png . || true
          
          # ၂။ ပုံတွေကို Generate လုပ်မယ် (Default path ကို သုံးခိုင်းတာပါ)
          npx @capacitor/assets generate --android

          # ၃။ Project အဟောင်းဖျက်ပြီး အသစ်ပြန်ဆောက်မယ်
          rm -rf android
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          
          # ၄။ Sync လုပ်ပြီး ပုံတွေကို အတင်းကူးထည့်မယ်
          npx cap copy android
          npx cap sync android
          cp -R resources/android/* android/app/src/main/res/ || true

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
