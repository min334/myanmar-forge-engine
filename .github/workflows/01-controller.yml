name: 01-controller

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build and Patch with AI
        run: |
          node index.js  # ခင်ဗျားရဲ့ မူလ APK Logic ကို Run မယ်
          # Capacitor initialized ကို index.js က လုပ်ပြီးသားလို့ ယူဆပါတယ်
          npx cap add android || true
          npx cap copy android
          node fixer.js  # အိုင်ကွန်နဲ့ Splash ကို အတင်းပြင်ခိုင်းမယ်
          npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myanmar-forge-engine-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
