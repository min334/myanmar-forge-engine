name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✨ Java ကို သေချာထည့်ပေးရပါမယ် (ဒါမှ Android Build အောင်မှာပါ)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build UI & Install Tools
        run: |
          npm install
          node index.js

      # ✨ Icon ထုတ်တဲ့အခါ Android folder ထဲ ရောက်သွားအောင် --android flag သုံးပါမယ်
      - name: Generate App Assets (Icon & Splash)
        run: |
          npx @capacitor/assets generate --android

      - name: Capacitor Build
        run: |
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # UI နဲ့ အိုင်ကွန်အသစ်တွေကို Android ထဲ အတင်းထည့်ခိုင်းတာပါ
          npx cap copy android
          npx cap sync android
          
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
