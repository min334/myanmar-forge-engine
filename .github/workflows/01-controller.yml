name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          # package.json ကို အသစ်ပြန်ဆောက်ပြီး လိုအပ်တာတွေ install လုပ်မယ်
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # UI Logic ကို Run မယ်
          node index.js

      - name: Force Regenerate Android with Assets
        run: |
          # ၁။ ပုံတွေကို Root (အပြင်) မှာပဲ ရှိနေတယ်လို့ သတ်မှတ်ပြီး Generate လုပ်မယ်
          npx @capacitor/assets generate --android --asset-path .

          # ၂။ Android Project အဟောင်းကို ရှင်းထုတ်မယ်
          rm -rf android
          
          # ၃။ Project အသစ်ပြန်ဆောက်မယ်
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          
          # ၄။ Sync လုပ်ပြီး ပုံတွေကို manual force copy လုပ်မယ်
          npx cap copy android
          npx cap sync android
          
          # ၅။ အိုင်ကွန်တွေ သေချာပေါက်ပါအောင် res folder ထဲ အတင်းထည့်မယ်
          cp -R resources/android/* android/app/src/main/res/ || true

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
