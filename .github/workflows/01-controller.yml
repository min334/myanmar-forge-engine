- name: Build & Fix with AI Robot
        run: |
          # ၁။ UI ကို အရင်ဆောက်မယ်
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          node index.js
          
          # ၂။ Android project တည်ဆောက်မယ်
          rm -rf android
          npx cap init "Myanmar Forge Engine" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          npx cap copy android
          
          # ၃။ fixer.js (AI Robot) ကို သုံးပြီး အိုင်ကွန်နဲ့ ပုံတွေကို အတင်းပြင်ခိုင်းမယ်
          node fixer.js
          
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
