name: 01-controller

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build and Patch with AI
        run: |
          # ၁။ www folder မရှိရင် အတင်းဆောက်ခိုင်းမယ် (Error မတက်အောင်)
          mkdir -p www
          echo "<html><body>Myanmar Forge Engine Ready</body></html>" > www/index.html
          
          # ၂။ ခင်ဗျားရဲ့ မူလ APK Logic ကို Run မယ်
          node index.js
          
          # ၃။ Android project ကို တည်ဆောက်ပြီး Patch လုပ်မယ်
          rm -rf android
          npx cap init "Myanmar Forge Engine" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          npx cap copy android
          
          # ၄။ fixer.js ကို run ပြီး icon ပြင်မယ်
          node fixer.js
          
          npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myanmar-forge-engine-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
