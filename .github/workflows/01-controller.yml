name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          node index.js

      - name: Full Force Assets Integration
        run: |
          # ၁။ အပြင်မှာရှိတဲ့ ပုံတွေကို Capacitor Assets tool က သိတဲ့နေရာထဲ အရင်ထည့်မယ်
          mkdir -p assets
          cp icon-only.png assets/icon-only.png || true
          cp splash.png assets/splash.png || true

          # ၂။ ပုံတွေကို Generate လုပ်မယ်
          npx @capacitor/assets generate --android --asset-path assets || true

          # ၃။ Android Project ကို အသစ်ပြန်ဆောက်မယ်
          rm -rf android
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          npx cap copy android
          
          # ၄။ (အရေးကြီးဆုံး) Generate လုပ်ထားတဲ့ ပုံတွေကို Android Project ထဲ အတင်းထည့်မယ်
          # ဒါက အိုင်ကွန်ရော Splash ရော သေချာပေါက် ပြောင်းစေမှာပါ
          cp -R resources/android/* android/app/src/main/res/ || true

          # ၅။ Sync ပြန်လုပ်မယ်
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
