name: 01-Build-Controller-App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies & Build UI
        run: |
          npm install
          # Capacitor Assets tool ကို သေချာပေါက်ပါအောင် install လုပ်တာပါ
          npm install @capacitor/assets @capacitor/cli @capacitor/android
          node index.js

      - name: Force Regenerate Android with Assets
        run: |
          # ၁။ အိုင်ကွန်တွေနဲ့ Splash ကို assets folder ထဲကနေ အရင်ထုတ်မယ်
          npx @capacitor/assets generate --android

          # ၂။ ရှိပြီးသား android project folder ကို အကုန်ဖျက်ပြီး အသစ်ပြန်ဆောက်မယ်
          # (ဒါမှ အိုင်ကွန်အဟောင်းတွေ လုံးဝမကျန်မှာပါ)
          rm -rf android
          
          npx cap init "Forge Controller" "com.minthitsar.forge" --web-dir www || true
          npx cap add android
          
          # ၃။ UI ကုဒ်တွေနဲ့ အိုင်ကွန်အသစ်တွေကို android project ထဲ ကူးထည့်မယ်
          npx cap copy android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
